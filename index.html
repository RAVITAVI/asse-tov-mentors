<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <title>מערכת שפיטה למנטורים - כנס עשה טוב</title>
</head>
<body>

    <div id="login-screen" class="screen active">
        <img src="campus-hemad-logo.jpg" alt="לוגו קמפוס חמד" class="logo-square">
        <h1>מערכת שפיטה למנטורים</h1>
        <p class="subtitle">כנס להצגת יוזמות "עשה טוב" תשפ"ו</p>
        
        <div class="login-card">
            <label for="mentor-dropdown">בחר/י את שמך מהרשימה:</label>
            <select id="mentor-dropdown" class="mentor-select">
                <option value="">טוען רשימת מנטורים...</option>
            </select>
            <button id="enterBtn" class="enter-btn">כניסה למערכת הדירוג</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="lobby-header">
            <div class="welcome-msg">שופט/ת: <span id="user-display-name">---</span></div>
            <div class="progress-container">
                <span class="progress-text">התקדמות דירוג: <strong id="progress-count">0/0</strong></span>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <div class="lobby-content-wrapper">
            <h2 class="page-title">לוח מיזמים מנטורים</h2>
            <p class="page-subtitle">סרקו ברקוד בעמדה או לחצו על מיזם שכבר דורג לעדכון:</p>

            <button id="scan-qr-btn" class="scan-main-btn">📷 סרוק ברקוד שולחן</button>

            <div class="gender-section-title">🔷 מסלול בנים</div>
            <div id="boys-projects-grid" class="projects-grid-container"></div>

            <div class="gender-section-title pink">💖 מסלול בנות</div>
            <div id="girls-projects-grid" class="projects-grid-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
