<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <title>מערכת שפיטה למנטורים - כנס עשה טוב</title>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="login-centered-content">
            <div class="logo-frame">
                <img src="campus-hemad-logo.jpg" alt="לוגו קמפוס חמד">
            </div>
            
            <h1 class="main-app-title">מערכת שפיטה למנטורים</h1>
            <p class="app-subtitle">כנס להצגת יוזמות "עשה טוב" תשפ"ו</p>
            
            <div class="login-card">
                <label for="mentor-dropdown" class="card-label">בחר/י את שמך מהרשימה:</label>
                <div class="select-container">
                    <select id="mentor-dropdown" class="mentor-select">
                        <option value="">טוען רשימת מנטורים...</option>
                    </select>
                </div>
                <button id="enterBtn" class="orange-login-btn">כניסה למערכת הדירוג</button>
            </div>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="lobby-header">
            <div class="welcome-msg">שופט/ת: <span id="user-display-name">---</span></div>
            <div class="progress-container">
                <span class="progress-text">התקדמות דירוג: <strong id="progress-count">0/0</strong></span>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
            </div>
        </div>

        <div class="lobby-content-wrapper">
            <h2 class="page-title">לוח מיזמים מנטורים</h2>
            <p class="page-subtitle">סרקו ברקוד בעמדה או לחצו על מיזם שכבר דורג לעדכון:</p>

            <button id="scan-qr-btn" class="scan-main-btn">📷 סרוק ברקוד שולחן</button>

            <div class="gender-section-title">מיזמי בנים:</div>
            <div id="boys-projects-grid" class="projects-grid-container"></div>

            <div class="gender-section-title pink">מיזמי בנות:</div>
            <div id="girls-projects-grid" class="projects-grid-container"></div>
        </div>
    </div>

    <div id="rating-screen" class="screen">
        <div class="rating-header">
            <button id="rating-back-btn" class="back-arrow-btn">➔</button>
            <div class="rating-title-area">
                <h2 id="modal-project-title">שם המיזם</h2>
                <div id="modal-project-creators" class="creators-names">שמות היזמים</div>
                <div class="rating-subtitle-row">
                    <span id="modal-project-no">מיזם מספר --</span>
                    <span id="modal-project-gender" class="gender-badge">---</span>
                </div>
            </div>
        </div>

        <div class="rating-body-scroll">
            <div class="rating-container-inside" id="categories-container"></div>
        </div>

        <div class="rating-fixed-footer">
            <button id="modal-save-btn" class="full-page-save-btn">💾 שמור דירוג והמשך</button>
            <button id="modal-cancel-btn" class="full-page-cancel-btn">❌ בטל וחזור</button>
        </div>
    </div>

    <div id="scanner-modal" class="modal-overlay">
        <div class="modal-card scanner-card">
            <button id="scanner-close-x" class="modal-close-x">✕</button>
            <div class="modal-header-popup">
                <h3>סריקת ברקוד המיזם</h3>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 15px; text-align: center; color: #475569;">כוונו את המצלמה לברקוד שעל השולחן</p>
                <div id="qr-reader" style="width: 100%; max-width: 350px; margin: 0 auto; border-radius: 12px; overflow: hidden;"></div>
            </div>
        </div>
    </div>

    <script src="script.js?v=2.1"></script>
</body>
</html>
